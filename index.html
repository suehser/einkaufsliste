<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛒 Einkaufsliste</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --surface2: #f0ece4;
    --ink: #1a1714;
    --ink2: #6b6560;
    --accent: #2d6a4f;
    --accent-light: #d8f3dc;
    --danger: #c0392b;
    --gold: #c49a00;
    --gold-light: #fdf3d0;
    --border: #e0d9ce;
    --radius: 16px;
    --shadow: 0 2px 16px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 60px;
  }
  header {
    background: var(--accent);
    color: #fff;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(45,106,79,0.3);
  }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; letter-spacing: -0.5px; }
  header p { font-size: 0.78rem; opacity: 0.75; margin-top: 2px; }
  .sync-indicator { display: flex; align-items: center; gap: 6px; font-size: 0.73rem; opacity: 0.9; margin-top: 8px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #52d68a; animation: pulse 2s infinite; }
  .sync-dot.offline { background: #ff6b6b; animation: none; }
  .sync-dot.syncing { background: #ffd93d; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 90px;
    z-index: 90;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: 11px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    font-weight: 500;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--ink2);
    border-bottom: 2.5px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--accent-light); }
  main { max-width: 640px; margin: 0 auto; padding: 18px 14px; }
  .add-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
    border: 1px solid var(--border);
  }
  .add-card h3 { font-family: 'Playfair Display', serif; font-size: 1rem; margin-bottom: 12px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  input[type="text"], select {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 9px;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, select:focus { border-color: var(--accent); }
  input.main-input { flex: 1; min-width: 150px; }
  input.qty-input { width: 72px; }
  select.cat-select, select.market-select { flex: 1; min-width: 120px; }
  .deal-toggle {
    display: flex; align-items: center; gap: 7px;
    font-size: 0.83rem; color: var(--gold); font-weight: 600;
    cursor: pointer; padding: 5px 0; margin-bottom: 4px;
  }
  .deal-toggle input { cursor: pointer; accent-color: var(--gold); width: 16px; height: 16px; }
  .btn-add {
    width: 100%; padding: 11px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 9px;
    font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 500;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
  }
  .btn-add:hover { background: #235c42; }
  .btn-add:active { transform: scale(0.98); }
  .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: flex-start; }
  .filter-bar select { font-size: 0.78rem; padding: 6px 9px; }
  .filter-bar label { font-size: 0.78rem; color: var(--ink2); font-weight: 500; margin-top: 7px; }

  /* Multi-select market filter */
  .market-filter-wrap { position: relative; }
  .market-filter-btn {
    display: flex; align-items: center; gap: 6px;
    font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
    padding: 6px 10px; border: 1.5px solid var(--border);
    border-radius: 9px; background: var(--bg); color: var(--ink);
    cursor: pointer; transition: border-color 0.2s; white-space: nowrap;
    min-width: 130px; justify-content: space-between;
  }
  .market-filter-btn:hover, .market-filter-btn.open { border-color: var(--accent); }
  .market-filter-btn .arrow { font-size: 0.6rem; opacity: 0.6; transition: transform 0.2s; }
  .market-filter-btn.open .arrow { transform: rotate(180deg); }
  .market-filter-badge {
    background: var(--accent); color: #fff;
    border-radius: 10px; font-size: 0.68rem; font-weight: 700;
    padding: 1px 6px; margin-left: 2px;
  }
  .market-dropdown {
    display: none; position: absolute; top: calc(100% + 4px); left: 0;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; box-shadow: var(--shadow);
    z-index: 200; min-width: 180px; overflow: hidden;
    animation: dropIn 0.15s ease;
  }
  @keyframes dropIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
  .market-dropdown.open { display: block; }
  .market-dropdown-item {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 13px; cursor: pointer; font-size: 0.83rem;
    transition: background 0.12s; user-select: none;
  }
  .market-dropdown-item:hover { background: var(--surface2); }
  .market-dropdown-item input[type="checkbox"] {
    accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer;
  }
  .market-dropdown-divider { height: 1px; background: var(--border); margin: 3px 0; }
  .market-dropdown-all {
    padding: 8px 13px; font-size: 0.75rem; font-weight: 600;
    color: var(--accent); cursor: pointer; letter-spacing: 0.03em;
    text-align: right; transition: background 0.12s;
  }
  .market-dropdown-all:hover { background: var(--accent-light); }
  .section-label {
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.09em;
    text-transform: uppercase; color: var(--ink2); margin: 16px 0 6px;
  }
  .item-card {
    background: var(--surface);
    border-radius: 11px;
    padding: 12px 12px;
    margin-bottom: 7px;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    animation: slideIn 0.22s ease;
    position: relative; overflow: hidden;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-7px)} to{opacity:1;transform:translateY(0)} }
  .item-card.deal { border-color: var(--gold); background: linear-gradient(135deg,#fff 75%,var(--gold-light)); }
  .item-card.checked { opacity: 0.42; }
  .item-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); transform: translateY(-1px); }
  .deal-ribbon {
    position: absolute; top: 0; right: 0;
    background: var(--gold); color: #fff;
    font-size: 0.6rem; font-weight: 800; letter-spacing: 0.06em;
    padding: 3px 8px 3px 12px;
    clip-path: polygon(12% 0, 100% 0, 100% 100%, 0 100%);
  }
  .check-btn {
    width: 25px; height: 25px; border-radius: 50%;
    border: 2px solid var(--border); background: none;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; color: transparent; font-size: 13px;
  }
  .item-card.checked .check-btn { background: var(--accent); border-color: var(--accent); color: #fff; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 0.92rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-card.checked .item-name { text-decoration: line-through; }
  .item-meta { display: flex; gap: 5px; margin-top: 3px; flex-wrap: wrap; }
  .badge { font-size: 0.68rem; padding: 2px 7px; border-radius: 20px; font-weight: 500; }
  .badge-market { background: #e3f2fd; color: #1565c0; }
  .badge-qty { background: var(--accent-light); color: var(--accent); }
  .item-actions { display: flex; gap: 3px; }
  .btn-icon {
    background: none; border: none; cursor: pointer;
    padding: 5px; border-radius: 7px; color: var(--ink2);
    font-size: 0.95rem; transition: background 0.15s, color 0.15s;
  }
  .btn-icon:hover { background: var(--surface2); color: var(--danger); }
  .empty { text-align: center; padding: 36px 20px; color: var(--ink2); }
  .empty-icon { font-size: 2.3rem; margin-bottom: 8px; }
  .empty p { font-size: 0.88rem; }
  .settings-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 16px; box-shadow: var(--shadow);
    border: 1px solid var(--border); margin-bottom: 14px;
  }
  .settings-card h3 { font-family: 'Playfair Display', serif; font-size: 1rem; margin-bottom: 12px; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; }
  .tag {
    display: flex; align-items: center; gap: 4px;
    background: var(--surface2); border-radius: 20px;
    padding: 4px 11px; font-size: 0.8rem; font-weight: 500;
  }
  .tag .del-tag { cursor: pointer; color: var(--ink2); font-size: 0.85rem; line-height: 1; transition: color 0.15s; }
  .tag .del-tag:hover { color: var(--danger); }
  .add-tag-row { display: flex; gap: 8px; }
  .btn-sm {
    padding: 7px 14px; border-radius: 8px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.83rem; font-weight: 500;
    cursor: pointer; background: var(--accent); color: #fff;
    transition: background 0.2s; white-space: nowrap;
  }
  .btn-sm:hover { background: #235c42; }
  .summary-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 9px; padding: 9px 13px; margin-bottom: 14px;
    display: flex; gap: 14px; font-size: 0.78rem; color: var(--ink2); flex-wrap: wrap;
  }
  .summary-bar span strong { color: var(--ink); }
  .deal-section-header {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.68rem; font-weight: 800; letter-spacing: 0.09em;
    text-transform: uppercase; color: var(--gold); margin: 16px 0 6px;
  }
  .loading {
    text-align: center; padding: 40px 20px; color: var(--ink2);
    font-size: 0.9rem;
  }
  @media (max-width: 380px) { .form-row { flex-direction: column; } input.qty-input { width: 100%; } }
</style>
</head>
<body>

<header>
  <h1>🛒 Einkaufsliste</h1>
  <p>Gemeinsam einkaufen — überall synchron</p>
  <div class="sync-indicator">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncStatus">Verbinde mit Firebase…</span>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('liste')">📋 Liste</button>
  <button class="tab-btn" onclick="showTab('angebote')">🏷️ Angebote</button>
  <button class="tab-btn" onclick="showTab('erledigt')">✅ Erledigt</button>
  <button class="tab-btn" onclick="showTab('einstellungen')">⚙️ Einstellungen</button>
</div>

<main>
  <!-- LISTE -->
  <div id="tab-liste">
    <div class="add-card">
      <h3>Produkt hinzufügen</h3>
      <div class="form-row">
        <input type="text" class="main-input" id="itemName" placeholder="Produktname…" onkeydown="if(event.key==='Enter')addItem()">
        <input type="text" class="qty-input" id="itemQty" placeholder="Menge">
      </div>
      <div class="form-row">
        <select class="cat-select" id="itemCat"></select>
        <select class="market-select" id="itemMarket"><option value="">Kein Markt</option></select>
      </div>
      <label class="deal-toggle">
        <input type="checkbox" id="itemDeal"> Als Angebot markieren 🏷️
      </label>
      <button class="btn-add" onclick="addItem()">+ Hinzufügen</button>
    </div>
    <div class="filter-bar">
      <label>Filter:</label>
      <select id="filterCat" onchange="render()"><option value="">Alle Kategorien</option></select>
      <div class="market-filter-wrap" id="marketFilterWrap">
        <button class="market-filter-btn" id="marketFilterBtn" onclick="toggleMarketDropdown()">
          <span id="marketFilterLabel">Alle Märkte</span>
          <span class="arrow">&#9660;</span>
        </button>
        <div class="market-dropdown" id="marketDropdown">
          <div class="market-dropdown-item" onclick="toggleMarketFilter('__none__')">
            <input type="checkbox" id="chk-none" onclick="event.stopPropagation();toggleMarketFilter('__none__')"> Kein Markt
          </div>
          <div class="market-dropdown-divider"></div>
          <div id="marketCheckboxList"></div>
          <div class="market-dropdown-divider"></div>
          <div class="market-dropdown-all" onclick="clearMarketFilter()">Alle anzeigen</div>
        </div>
      </div>
    </div>
    <div id="summary-bar" class="summary-bar" style="display:none"></div>
    <div id="list-container"><div class="loading">⏳ Lade Daten…</div></div>
  </div>

  <!-- ANGEBOTE -->
  <div id="tab-angebote" style="display:none">
    <div id="deals-container"></div>
  </div>

  <!-- ERLEDIGT -->
  <div id="tab-erledigt" style="display:none">
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
      <button class="btn-sm" style="background:var(--danger)" onclick="clearChecked()">Alle löschen</button>
    </div>
    <div id="checked-container"></div>
  </div>

  <!-- EINSTELLUNGEN -->
  <div id="tab-einstellungen" style="display:none">
    <div class="settings-card">
      <h3>🏪 Supermärkte</h3>
      <div class="tag-list" id="market-tag-list"></div>
      <div class="add-tag-row">
        <input type="text" id="newMarket" placeholder="z.B. Netto" onkeydown="if(event.key==='Enter')addMarket()">
        <button class="btn-sm" onclick="addMarket()">+ Hinzufügen</button>
      </div>
    </div>
    <div class="settings-card">
      <h3>🗂️ Kategorien</h3>
      <div class="tag-list" id="cat-tag-list"></div>
      <div class="add-tag-row">
        <input type="text" id="newCat" placeholder="z.B. Getränke" onkeydown="if(event.key==='Enter')addCat()">
        <button class="btn-sm" onclick="addCat()">+ Hinzufügen</button>
      </div>
    </div>
    <div class="settings-card">
      <h3>🗑️ Liste verwalten</h3>
      <div style="display:flex;gap:9px;flex-wrap:wrap">
        <button class="btn-sm" style="background:var(--danger)" onclick="if(confirm('Gesamte Liste löschen?'))clearAll()">Liste leeren</button>
      </div>
    </div>
  </div>
</main>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, push, update, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ─── Firebase Config ───────────────────────────────────────────
const app = initializeApp({
  databaseURL: 'https://einkaufsliste-die-suehsen-default-rtdb.europe-west1.firebasedatabase.app'
});
const db = getDatabase(app);

// ─── Refs ──────────────────────────────────────────────────────
const itemsRef   = ref(db, 'items');
const catsRef    = ref(db, 'categories');
const marketsRef = ref(db, 'markets');

// ─── Local state ───────────────────────────────────────────────
let items      = {};   // { firebaseKey: itemObj }
let categories = [];
let markets    = [];
let currentTab = 'liste';

const DEFAULT_CATS    = ['Obst & Gemüse','Milch & Käse','Fleisch','Backwaren','Getränke','Tiefkühl','Haushalt','Sonstiges'];
const DEFAULT_MARKETS = ['Aldi','Lidl','Rewe','Edeka','Penny'];

// ─── Sync status ───────────────────────────────────────────────
function setSync(state) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncStatus');
  if (state === 'online')  { dot.className='sync-dot'; txt.textContent='Echtzeit-Sync aktiv · Firebase'; }
  if (state === 'offline') { dot.className='sync-dot offline'; txt.textContent='Keine Verbindung'; }
  if (state === 'syncing') { dot.className='sync-dot syncing'; txt.textContent='Synchronisiere…'; }
}

// ─── Realtime listeners ────────────────────────────────────────
onValue(itemsRef, snap => {
  items = snap.val() || {};
  setSync('online');
  render();
  if (currentTab === 'angebote') renderDeals();
  if (currentTab === 'erledigt') renderChecked();
}, () => setSync('offline'));

onValue(catsRef, snap => {
  categories = snap.val() || DEFAULT_CATS;
  if (!snap.val()) set(catsRef, DEFAULT_CATS);
  populateSelects();
  renderSettings();
});

onValue(marketsRef, snap => {
  markets = snap.val() || DEFAULT_MARKETS;
  if (!snap.val()) set(marketsRef, DEFAULT_MARKETS);
  populateSelects();
  renderSettings();
});

// ─── Market multi-filter state ────────────────────────────────
let activeMarketFilters = new Set(); // empty = show all

window.rebuildMarketCheckboxes = function() {
  const list = document.getElementById('marketCheckboxList');
  if (!list) return;
  list.innerHTML = markets.map(m => `
    <div class="market-dropdown-item" onclick="toggleMarketFilter('${m}')">
      <input type="checkbox" id="chk-${m}" ${activeMarketFilters.has(m)?'checked':''} onclick="event.stopPropagation();toggleMarketFilter('${m}')"> ${m}
    </div>
  `).join('');
  // sync "none" checkbox
  const noneChk = document.getElementById('chk-none');
  if (noneChk) noneChk.checked = activeMarketFilters.has('__none__');
  updateMarketFilterLabel();
};

window.toggleMarketFilter = function(val) {
  if (activeMarketFilters.has(val)) {
    activeMarketFilters.delete(val);
  } else {
    activeMarketFilters.add(val);
  }
  rebuildMarketCheckboxes();
  render();
};

window.clearMarketFilter = function() {
  activeMarketFilters.clear();
  rebuildMarketCheckboxes();
  render();
  closeMarketDropdown();
};

function updateMarketFilterLabel() {
  const label = document.getElementById('marketFilterLabel');
  if (!label) return;
  if (activeMarketFilters.size === 0) {
    label.innerHTML = 'Alle Märkte';
    document.getElementById('marketFilterBtn').querySelector('.arrow').insertAdjacentHTML('beforebegin', '');
  } else {
    const names = [...activeMarketFilters].map(v => v === '__none__' ? 'Kein Markt' : v);
    label.innerHTML = names.length <= 2
      ? names.join(', ')
      : names.slice(0,2).join(', ') + ` <span class="market-filter-badge">+${names.length-2}</span>`;
  }
}

window.toggleMarketDropdown = function() {
  const btn = document.getElementById('marketFilterBtn');
  const dd  = document.getElementById('marketDropdown');
  const open = dd.classList.toggle('open');
  btn.classList.toggle('open', open);
};

window.closeMarketDropdown = function() {
  document.getElementById('marketDropdown').classList.remove('open');
  document.getElementById('marketFilterBtn').classList.remove('open');
};

// Close dropdown on outside click
document.addEventListener('click', e => {
  const wrap = document.getElementById('marketFilterWrap');
  if (wrap && !wrap.contains(e.target)) closeMarketDropdown();
});

// ─── Add item ──────────────────────────────────────────────────
window.addItem = function() {
  const name = document.getElementById('itemName').value.trim();
  if (!name) { document.getElementById('itemName').focus(); return; }
  setSync('syncing');
  push(itemsRef, {
    name,
    qty:     document.getElementById('itemQty').value.trim(),
    cat:     document.getElementById('itemCat').value,
    market:  document.getElementById('itemMarket').value,
    deal:    document.getElementById('itemDeal').checked,
    checked: false,
    addedAt: Date.now()
  });
  document.getElementById('itemName').value  = '';
  document.getElementById('itemQty').value   = '';
  document.getElementById('itemDeal').checked = false;
  document.getElementById('itemName').focus();
};

// ─── Toggle check ──────────────────────────────────────────────
window.toggleCheck = function(key) {
  const item = items[key];
  if (!item) return;
  setSync('syncing');
  update(ref(db, 'items/' + key), { checked: !item.checked });
};

// ─── Delete item ───────────────────────────────────────────────
window.deleteItem = function(key) {
  setSync('syncing');
  remove(ref(db, 'items/' + key));
};

// ─── Clear checked ─────────────────────────────────────────────
window.clearChecked = function() {
  if (!confirm('Alle erledigten Produkte löschen?')) return;
  setSync('syncing');
  Object.entries(items).forEach(([k, v]) => { if (v.checked) remove(ref(db, 'items/' + k)); });
};

// ─── Clear all ─────────────────────────────────────────────────
window.clearAll = function() {
  setSync('syncing');
  set(itemsRef, null);
};

// ─── Markets ───────────────────────────────────────────────────
window.addMarket = function() {
  const val = document.getElementById('newMarket').value.trim();
  if (!val || markets.includes(val)) return;
  set(marketsRef, [...markets, val]);
  document.getElementById('newMarket').value = '';
};

window.deleteMarket = function(m) {
  set(marketsRef, markets.filter(x => x !== m));
};

// ─── Categories ────────────────────────────────────────────────
window.addCat = function() {
  const val = document.getElementById('newCat').value.trim();
  if (!val || categories.includes(val)) return;
  set(catsRef, [...categories, val]);
  document.getElementById('newCat').value = '';
};

window.deleteCat = function(c) {
  set(catsRef, categories.filter(x => x !== c));
};

// ─── Selects ───────────────────────────────────────────────────
window.populateSelects = function() {
  ['itemCat','filterCat'].forEach(id => {
    const el = document.getElementById(id);
    const cur = el.value;
    el.innerHTML = id === 'filterCat' ? '<option value="">Alle Kategorien</option>' : '';
    categories.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      if (c === cur) o.selected = true;
      el.appendChild(o);
    });
  });
  // itemMarket select (add form only)
  const mktEl = document.getElementById('itemMarket');
  const mktCur = mktEl.value;
  mktEl.innerHTML = '<option value="">Kein Markt</option>';
  markets.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m;
    if (m === mktCur) o.selected = true;
    mktEl.appendChild(o);
  });
  // Rebuild market checkbox list in filter dropdown
  rebuildMarketCheckboxes();
};

// ─── Render helpers ────────────────────────────────────────────
function renderCard([key, item]) {
  return `<div class="item-card${item.deal?' deal':''}${item.checked?' checked':''}">
    ${item.deal?`<div class="deal-ribbon">ANGEBOT</div>`:''}
    <button class="check-btn" onclick="toggleCheck('${key}')">✓</button>
    <div class="item-info">
      <div class="item-name">${esc(item.name)}</div>
      <div class="item-meta">
        ${item.qty?`<span class="badge badge-qty">${esc(item.qty)}</span>`:''}
        ${item.market?`<span class="badge badge-market">🏪 ${esc(item.market)}</span>`:''}
      </div>
    </div>
    <div class="item-actions">
      <button class="btn-icon" onclick="deleteItem('${key}')">🗑️</button>
    </div>
  </div>`;
}

// ─── Render list ───────────────────────────────────────────────
window.render = function() {
  const catF = document.getElementById('filterCat').value;
  let entries = Object.entries(items).filter(([,i]) => !i.checked);
  if (catF) entries = entries.filter(([,i]) => i.cat === catF);
  if (activeMarketFilters.size > 0) {
    entries = entries.filter(([,i]) => {
      const m = i.market || '';
      return activeMarketFilters.has(m === '' ? '__none__' : m);
    });
  }

  // Sort newest first
  entries.sort((a,b) => (b[1].addedAt||0) - (a[1].addedAt||0));

  const total = Object.values(items).filter(i=>!i.checked).length;
  const deals = Object.values(items).filter(i=>i.deal&&!i.checked).length;
  const done  = Object.values(items).filter(i=>i.checked).length;
  const bar   = document.getElementById('summary-bar');
  if (total > 0 || done > 0) {
    bar.style.display = 'flex';
    bar.innerHTML = `<span><strong>${total}</strong> offen</span><span><strong>${deals}</strong> Angebote</span><span><strong>${done}</strong> erledigt</span>`;
  } else { bar.style.display = 'none'; }

  const container = document.getElementById('list-container');
  if (entries.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🛒</div><p>Keine Produkte.<br>Füge oben etwas hinzu!</p></div>`;
    return;
  }

  const groups = {};
  entries.forEach(entry => {
    const key = entry[1].cat || 'Sonstiges';
    if (!groups[key]) groups[key] = [];
    groups[key].push(entry);
  });

  container.innerHTML = Object.entries(groups).map(([cat, arr]) =>
    `<div class="section-label">${cat}</div>` + arr.map(renderCard).join('')
  ).join('');
};

// ─── Render deals ──────────────────────────────────────────────
window.renderDeals = function() {
  const container = document.getElementById('deals-container');
  const deals = Object.entries(items).filter(([,i]) => i.deal && !i.checked);
  if (deals.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🏷️</div><p>Keine Angebote markiert.</p></div>`;
    return;
  }
  const byMarket = {};
  deals.forEach(entry => {
    const key = entry[1].market || 'Kein Markt';
    if (!byMarket[key]) byMarket[key] = [];
    byMarket[key].push(entry);
  });
  container.innerHTML = Object.entries(byMarket).map(([m, arr]) =>
    `<div class="deal-section-header">🏪 ${esc(m)}</div>` + arr.map(renderCard).join('')
  ).join('');
};

// ─── Render checked ────────────────────────────────────────────
window.renderChecked = function() {
  const container = document.getElementById('checked-container');
  const checked = Object.entries(items).filter(([,i]) => i.checked);
  if (checked.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">✅</div><p>Noch nichts erledigt.</p></div>`;
    return;
  }
  container.innerHTML = checked.map(renderCard).join('');
};

// ─── Render settings ───────────────────────────────────────────
window.renderSettings = function() {
  const ml = document.getElementById('market-tag-list');
  if (ml) ml.innerHTML = markets.map(m =>
    `<div class="tag">🏪 ${esc(m)} <span class="del-tag" onclick="deleteMarket('${esc(m)}')">✕</span></div>`
  ).join('');
  const cl = document.getElementById('cat-tag-list');
  if (cl) cl.innerHTML = categories.map(c =>
    `<div class="tag">🗂️ ${esc(c)} <span class="del-tag" onclick="deleteCat('${esc(c)}')">✕</span></div>`
  ).join('');
};

// ─── Tab switching ─────────────────────────────────────────────
window.showTab = function(name) {
  currentTab = name;
  ['liste','angebote','erledigt','einstellungen'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name?'':'none';
  });
  document.querySelectorAll('.tab-btn').forEach((btn,i) => {
    btn.classList.toggle('active', ['liste','angebote','erledigt','einstellungen'][i]===name);
  });
  if (name==='angebote') renderDeals();
  if (name==='erledigt') renderChecked();
  if (name==='einstellungen') renderSettings();
};

// ─── Helpers ───────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
window.esc = esc;
</script>
</body>
</html>
